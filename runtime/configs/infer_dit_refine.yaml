model:
  name: ultrashape-refiner
  scope: mc-only
  params:
    vae_config:
      target: ultrashape_runtime.models.autoencoders.model.ShapeVAE
    dit_cfg:
      target: ultrashape_runtime.models.denoisers.dit_mask.RefineDiT
    conditioner_config:
      target: ultrashape_runtime.models.conditioner_mask.SingleImageEncoder
    scheduler_cfg:
      target: diffusers.FlowMatchEulerDiscreteScheduler
    image_processor_cfg:
      target: ultrashape_runtime.preprocessors.ImageProcessorV2
    surface_loader_cfg:
      target: ultrashape_runtime.surface_loaders.SharpEdgeSurfaceLoader
runtime:
  backend: local
  readiness_file: .runtime-readiness.json
  requires_exact_closure: true
  config_loader: OmegaConf.load
public_contract:
  backend_modes:
    - auto
    - local
  success_output_formats:
    - glb
  public_error_codes:
    - DEPENDENCY_MISSING
    - INVALID_INPUT
    - WEIGHTS_MISSING
    - LOCAL_RUNTIME_UNAVAILABLE
dependencies:
  required:
    imports:
      - torch
      - torchvision
      - numpy
      - trimesh
      - PIL
      - cv2
      - skimage
      - yaml
      - omegaconf
      - einops
      - transformers
      - huggingface_hub
      - accelerate
      - diffusers
      - cubvh
      - safetensors
      - tqdm
  conditional:
    - rembg
    - onnxruntime
  degradable:
    - flash_attn
checkpoint:
  primary: models/ultrashape/ultrashape_v1.pt
  required_subtrees:
    - vae
    - dit
    - conditioner
  checkpoint_contract:
    state_dict_metadata: required
    required_subtree_state:
      - state_dict
      - tensors
      - tensor_count
      - value_count
vae_config:
  target: ultrashape_runtime.models.autoencoders.model.ShapeVAE
dit_cfg:
  target: ultrashape_runtime.models.denoisers.dit_mask.RefineDiT
conditioner_config:
  target: ultrashape_runtime.models.conditioner_mask.SingleImageEncoder
weights:
  primary: models/ultrashape/ultrashape_v1.pt
preprocess:
  image_processor: ImageProcessorV2
  require_cutout: conditional
  tensor_contract:
    image_tensor: [batch, height, width, rgba]
    mask_tensor: [batch, height, width, alpha]
    image_meta:
      - width
      - height
      - pixel_count
      - source_format
  evidence:
    - mean_intensity
    - mask_coverage
    - cutout_applied
image_processor_cfg:
  target: ultrashape_runtime.preprocessors.ImageProcessorV2
surface_loader_cfg:
  target: ultrashape_runtime.surface_loaders.SharpEdgeSurfaceLoader
conditioning:
  coarse_mesh_encoder: SharpEdgeSurfaceLoader
  voxelizer: voxelize_from_point
  voxel_contract:
    voxel_cond:
      - coords
      - occupancies
      - resolution
      - bounds
  evidence:
    - image_mean
    - mesh_extent_sum
    - occupied_ratio
scheduler:
  family: flow-matching
  target: diffusers.FlowMatchEulerDiscreteScheduler
  contract:
    object_type: FlowMatchEulerDiscreteScheduler
    consumed_state:
      - timesteps
      - sigmas
  evidence:
    - timestep_count
    - sigma_start
    - sigma_end
scheduler_cfg:
  target: diffusers.FlowMatchEulerDiscreteScheduler
denoise:
  target: ultrashape_runtime.models.denoisers.dit_mask.RefineDiT
  moe_target: ultrashape_runtime.models.denoisers.moe_layers
  input_contract:
    - latents
    - timestep
    - context
    - context_mask
    - voxel_cond
decoder:
  vae: ShapeVAE
  volume_decoder: VanillaVDMVolumeDecoding
  evidence:
    - corner_count
    - occupied_cell_count
surface:
  extraction: mc
  loader: SharpEdgeSurfaceLoader
  target: ultrashape_runtime.surface_loaders.SharpEdgeSurfaceLoader
  surface_contract:
    sampled_surface_points: required
    mesh_state:
      - vertices
      - faces
      - bounds
  evidence:
    - source_cell_count
    - vertex_count
    - face_count
gate:
  mode: geometric-hard-gate
  evidence:
    - coarse_geometry_changed
    - image_dependency_proven
    - checkpoint_dependency_proven
export:
  format: glb
  filename: refined.glb
preserve_scale:
  restore: coarse-normalization-inverse
