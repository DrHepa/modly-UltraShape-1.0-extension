model:
  name: ultrashape-refiner
  scope: mc-only
runtime:
  backend: local
  readiness_file: .runtime-readiness.json
  requires_exact_closure: true
public_contract:
  backend_modes:
    - auto
    - local
  success_output_formats:
    - glb
  public_error_codes:
    - DEPENDENCY_MISSING
    - WEIGHTS_MISSING
    - LOCAL_RUNTIME_UNAVAILABLE
dependencies:
  required:
    imports:
      - torch
      - torchvision
      - numpy
      - trimesh
      - PIL
      - cv2
      - skimage
      - yaml
      - omegaconf
      - einops
      - transformers
      - huggingface_hub
      - accelerate
      - diffusers
      - cubvh
      - safetensors
      - tqdm
  conditional:
    - rembg
    - onnxruntime
  degradable:
    - flash_attn
checkpoint:
  primary: models/ultrashape/ultrashape_v1.pt
  required_subtrees:
    - vae
    - dit
    - conditioner
vae_config:
  target: ultrashape_runtime.models.autoencoders.model.ShapeVAE
dit_cfg:
  target: ultrashape_runtime.models.denoisers.dit_mask.RefineDiT
conditioner_config:
  target: ultrashape_runtime.models.conditioner_mask.SingleImageEncoder
weights:
  primary: models/ultrashape/ultrashape_v1.pt
preprocess:
  image_processor: ImageProcessorV2
  require_cutout: conditional
  evidence:
    - mean_intensity
    - mask_coverage
    - cutout_applied
image_processor_cfg:
  target: ultrashape_runtime.preprocessors.ImageProcessorV2
conditioning:
  coarse_mesh_encoder: SharpEdgeSurfaceLoader
  voxelizer: voxelize_from_point
  evidence:
    - image_mean
    - mesh_extent_sum
    - occupied_ratio
scheduler:
  family: flow-matching
  evidence:
    - timestep_count
    - sigma_start
    - sigma_end
scheduler_cfg:
  target: diffusers.FlowMatchEulerDiscreteScheduler
decoder:
  vae: ShapeVAE
  volume_decoder: VanillaVDMVolumeDecoding
  evidence:
    - corner_count
    - occupied_cell_count
surface:
  extraction: mc
  loader: SharpEdgeSurfaceLoader
  evidence:
    - source_cell_count
    - vertex_count
    - face_count
gate:
  mode: geometric-hard-gate
  evidence:
    - coarse_geometry_changed
    - image_dependency_proven
    - checkpoint_dependency_proven
export:
  format: glb
  filename: refined.glb
